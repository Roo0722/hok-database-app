name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java (required by Gradle / Android SDK) ──────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Gradle cache (speeds up repeat builds) ───────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-capacitor-6
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. Install npm dependencies (includes Capacitor) ────────────
      - name: Install npm dependencies
        run: npm install

      # ── 6. Build Next.js static export → out/ ───────────────────────
      - name: Build Next.js static site
        run: npm run build

      # ── 7. Add Android platform (generates android/ project) ────────
      - name: Add Capacitor Android platform
        run: ./node_modules/.bin/cap add android

      # ── 8. Sync web assets into the Android project ─────────────────
      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync android

      # ── 9. Make Gradle wrapper executable ───────────────────────────
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # ── 10. Build the debug APK ──────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 11. Upload APK as downloadable artifact ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoK-Database-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
